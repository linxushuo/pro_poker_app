<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EV Graph v5.3</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23121212'/><path d='M50 15 C20 45 10 65 30 75 C40 80 50 70 50 60 C50 70 60 80 70 75 C90 65 80 45 50 15 Z' fill='%23D4AF37'/><path d='M45 85 L55 85 L50 60 Z' fill='%23D4AF37'/><path d='M10 85 Q 40 60 50 45 T 90 20' fill='none' stroke='%23FF3366' stroke-width='6' stroke-linecap='round'/></svg>">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #E5C07B; --gold-dark: #D4AF37; --bg: #0d0d12; --card: #16161e; --win: #FF4757; --lose: #2ED573; --text: #E0E0E0; --accent: #2c2c3a; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); 
            overflow-x: hidden; width: 100%;
        }

        #auth-section, #app-section { display: none; min-height: 100vh; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: 30px; }
        
        /* 语言切换按钮样式 */
        .lang-toggle {
            position: fixed; top: calc(env(safe-area-inset-top) + 10px); right: 15px;
            z-index: 1000; background: rgba(255,255,255,0.1); border: 1px solid rgba(229,192,123,0.3);
            color: var(--gold); padding: 4px 10px; border-radius: 20px; font-size: 11px;
            font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }

        .glass-panel { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 18px; margin: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        
        input { 
            width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--accent); 
            color: #fff; border-radius: 10px; font-size: 14px; margin-bottom: 12px; 
            transition: border 0.3s; touch-action: manipulation;
        }
        input:focus { border-color: var(--gold); }
        
        .btn-main { 
            background: linear-gradient(135deg, var(--gold), #c49a2a); color: #000; border: none; 
            padding: 14px; border-radius: 10px; width: 100%; font-weight: 800; font-size: 14px; 
            cursor: pointer; transition: transform 0.1s; touch-action: manipulation;
        }
        .btn-main:active { transform: scale(0.97); }

        /* 级别切换栏优化：下移并增加触控高度 */
        .nav-tabs { 
            display: flex; overflow-x: auto; padding: 10px 12px; gap: 8px; 
            margin-top: 5px;
            background: var(--bg);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .nav-item { 
            padding: 10px 18px; border-radius: 12px; background: var(--accent); color: #888; 
            white-space: nowrap; font-size: 12px; font-weight: 600; transition: all 0.3s; 
            cursor: pointer; border: 1px solid transparent; touch-action: manipulation;
            min-height: 40px; display: flex; align-items: center; justify-content: center;
        }
        .nav-item.active { background: rgba(229,192,123,0.15); color: var(--gold); border-color: rgba(229,192,123,0.3); }
        .nav-tabs::-webkit-scrollbar { display: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 12px; }
        .stat-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 12px 8px; text-align: center; }
        .stat-label { font-size: 10px; color: #666; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 15px; font-weight: 900; color: #fff; font-family: 'SF Pro Display', sans-serif; }

        .chart-box { height: 260px; margin: 0 12px 15px 12px; background: var(--card); border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); }
        
        .batch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .chip { 
            background: #1a1a24; padding: 12px 0; text-align: center; border-radius: 10px; 
            font-weight: bold; font-size: 13px; cursor: pointer; border: 1px solid var(--accent); 
            touch-action: manipulation; min-height: 44px; display: flex; align-items: center; justify-content: center;
        }

        .filter-toolbar { display: flex; justify-content: space-between; align-items: center; margin: 5px 15px 12px 15px; }
        .time-pill-group { display: flex; background: var(--card); padding: 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .time-pill { padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 6px; color: #666; cursor: pointer; touch-action: manipulation; }
        .time-pill.active { background: var(--accent); color: var(--gold); }
        .month-selector { background: var(--card); border: 1px solid var(--accent); color: #fff; font-size: 11px; border-radius: 6px; padding: 4px 8px; }

        .item-card { background: var(--card); padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); display: flex; flex-direction: column; gap: 8px; }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-amt { font-size: 22px; font-weight: 900; font-family: 'SF Pro Display', sans-serif; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-mini { 
            padding: 8px; border-radius: 8px; border: none; font-size: 11px; font-weight: 700; 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; 
            cursor: pointer; touch-action: manipulation; min-height: 36px;
        }
        .btn-edit { background: rgba(255,255,255,0.05); color: #888; }
        .btn-del { background: rgba(255,71,87,0.08); color: var(--win); }

        .toast { 
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.95); color: #000; padding: 10px 20px; 
            border-radius: 20px; font-size: 12px; z-index: 10001; display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 800; 
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">提示信息</div>
    <div class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</div>

    <div id="auth-section">
        <div class="glass-panel" style="margin-top:15vh;">
            <h2 id="txt-auth-title" style="color:var(--gold); text-align:center; margin-bottom: 25px; font-size: 20px;">系统验证</h2>
            <input type="email" id="emailInput" placeholder="Access ID">
            <input type="password" id="passwordInput" placeholder="Security Token">
            <button class="btn-main" id="loginBtn" onclick="handleLogin()">授权登录</button>
        </div>
    </div>

    <div id="app-section">
        <!-- 核心盈亏总额 -->
        <div id="totalWaterDisplay" style="text-align: center; font-size: 32px; font-weight: 900; margin: 15px 0 5px 0; font-family: 'SF Pro Display', sans-serif;">0</div>
        
        <!-- 级别导航切换 - 移至显眼位置，确保点击 -->
        <div class="nav-tabs" id="navTabs">
            <div class="nav-item active" onclick="switchLevel('ALL')" data-key="nav-all">全部记录</div>
            <div class="nav-item" onclick="switchLevel('0.5/1')">0.5/1</div>
            <div class="nav-item" onclick="switchLevel('1/2')">1/2</div>
            <div class="nav-item" onclick="switchLevel('10/20')">10/20</div>
        </div>

        <!-- 统计指标 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label" data-key="label-winrate">胜率分布</div>
                <div id="statWinRate" class="stat-value">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" data-key="label-avgwin">单局均效</div>
                <div id="statAvgWin" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" data-key="label-swing">单日极值</div>
                <div id="statMaxSwing" class="stat-value" style="font-size: 12px; line-height: 1.2;">+0<br><span style="color:#444">/</span> -0</div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="chart-box" id="mainChart"></div>

        <!-- 录入面板 -->
        <div class="glass-panel" style="margin-top: 0; padding: 15px;">
            <h4 style="margin:0 0 12px 0; color:#fff; display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
                <span><i class="fas fa-bolt" style="color:var(--gold)"></i> <span data-key="panel-input">快速结算</span></span>
                <span id="currentLevelHint" style="font-size: 10px; color: #666;">Level: 1/2</span>
            </h4>
            <input type="number" id="quickAmount" placeholder="输入本局盈亏积分" data-key="placeholder-amt" style="font-size: 18px; font-weight: bold; text-align: center;">
            <div class="batch-grid">
                <div class="chip" style="color:var(--win); border-color: rgba(255,71,87,0.15)" onclick="adjustAmount(100)">+100</div>
                <div class="chip" style="color:var(--win); border-color: rgba(255,71,87,0.15)" onclick="adjustAmount(500)">+500</div>
                <div class="chip" style="color:var(--lose); border-color: rgba(46,213,115,0.15)" onclick="adjustAmount(-100)">-100</div>
                <div class="chip" style="color:var(--lose); border-color: rgba(46,213,115,0.15)" onclick="adjustAmount(-500)">-500</div>
            </div>
            <button class="btn-main" id="submitBtn" onclick="submitData()" data-key="btn-sync">同步至加密云端</button>
        </div>

        <!-- 历史筛选 -->
        <div class="filter-toolbar">
            <div class="time-pill-group">
                <div class="time-pill active" onclick="switchTime('ALL', this)" data-key="time-all">全部</div>
                <div class="time-pill" onclick="switchTime('MONTH', this)" data-key="time-month">本月</div>
                <div class="time-pill" onclick="switchTime('WEEK', this)" data-key="time-week">本周</div>
            </div>
            <input type="month" id="monthPicker" class="month-selector" onchange="searchByMonth(this.value)">
        </div>

        <div style="padding: 0 12px;">
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // 1. 中英文词典
        const langPack = {
            'zh': {
                'auth-title': '系统验证', 'btn-auth': '授权登录', 'nav-all': '全部汇总',
                'label-winrate': '胜率分布', 'label-avgwin': '单局均效', 'label-swing': '单日极值',
                'panel-input': '快速结算', 'placeholder-amt': '输入本局盈亏积分', 'btn-sync': '同步至加密云端',
                'time-all': '全部', 'time-month': '本月', 'time-week': '本周',
                'toast-success': '同步成功', 'toast-fail': '同步失败', 'confirm-del': '确定要永久撤销吗？',
                'no-data': '无记录数据', 'btn-edit': '修正', 'btn-del': '撤销', 'chart-bar': '单局', 'chart-line': '累计'
            },
            'en': {
                'auth-title': 'Verification', 'btn-auth': 'LOG IN', 'nav-all': 'ALL DATA',
                'label-winrate': 'WIN RATE', 'label-avgwin': 'AVG WIN', 'label-swing': 'SWING',
                'panel-input': 'QUICK INPUT', 'placeholder-amt': 'Input amount', 'btn-sync': 'SYNC TO CLOUD',
                'time-all': 'ALL', 'time-month': 'MONTH', 'time-week': 'WEEK',
                'toast-success': 'SUCCESS', 'toast-fail': 'FAILED', 'confirm-del': 'Are you sure?',
                'no-data': 'NO DATA', 'btn-edit': 'EDIT', 'btn-del': 'UNDO', 'chart-bar': 'Session', 'chart-line': 'Total'
            }
        };

        let curLang = localStorage.getItem('ev_lang') || 'zh';

        function updateLangUI() {
            document.getElementById('langBtn').innerText = curLang === 'zh' ? 'EN' : '中';
            const pack = langPack[curLang];
            document.getElementById('txt-auth-title').innerText = pack['auth-title'];
            document.getElementById('loginBtn').innerText = pack['btn-auth'];
            document.getElementById('quickAmount').placeholder = pack['placeholder-amt'];
            document.getElementById('submitBtn').innerText = pack['btn-sync'];
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if(pack[key]) el.innerText = pack[key];
            });
            if(fullData.length > 0) render(); 
        }

        function toggleLanguage() {
            curLang = curLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('ev_lang', curLang);
            updateLangUI();
            if(navigator.vibrate) navigator.vibrate(15);
        }

        // 2. 数据库配置
        const SUPABASE_URL = 'https://bemgvdxisardejdvbnif.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_qfMjJSCX0FGWbgnurfcUEg_RCBvb9Pz';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentLevel = 'ALL';
        let currentTimeFilter = 'ALL'; 
        let currentSearchMonth = ''; 
        let fullData = [];
        let myChart = null; 

        function showToast(msgKey) {
            const toast = document.getElementById('toast');
            const msg = langPack[curLang][msgKey] || msgKey;
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'flex'; 
                if (!myChart) {
                    myChart = echarts.init(document.getElementById('mainChart'));
                    window.addEventListener('resize', () => myChart && myChart.resize());
                }
                fetchData();
            } else {
                document.getElementById('auth-section').style.display = 'flex';
                document.getElementById('app-section').style.display = 'none';
            }
        });

        async function handleLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            if (!email || !password) return;

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
            } catch (err) { showToast('Access Denied'); }
        }

        async function fetchData() {
            try {
                const { data, error } = await supabaseClient
                    .from('poker_logs')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: true });
                if (error) throw error;
                fullData = data || [];
                render(); 
            } catch (err) { showToast('Sync Error'); }
        }

        function adjustAmount(val) {
            const input = document.getElementById('quickAmount');
            input.value = (parseFloat(input.value) || 0) + val;
            if(navigator.vibrate) navigator.vibrate(20); 
        }

        async function submitData() {
            const val = parseFloat(document.getElementById('quickAmount').value);
            if (isNaN(val)) return;

            try {
                const targetLevel = currentLevel === 'ALL' ? '1/2' : currentLevel;
                const { error } = await supabaseClient.from('poker_logs').insert([{
                    user_id: currentUser.id, amount: val, level: targetLevel
                }]);
                if (error) throw error;
                document.getElementById('quickAmount').value = '';
                showToast('toast-success');
                await fetchData(); 
            } catch (err) { showToast('toast-fail'); }
        }

        async function editItem(id, currentAmount) {
            const newVal = prompt(langPack[curLang]['btn-edit'], currentAmount);
            if (newVal === null) return; 
            const parsedVal = parseFloat(newVal);
            if (isNaN(parsedVal)) return;

            try {
                const { error } = await supabaseClient.from('poker_logs').update({ amount: parsedVal }).eq('id', id).eq('user_id', currentUser.id);
                if (error) throw error;
                await fetchData(); 
            } catch (err) { showToast('Update Error'); }
        }

        async function deleteItem(id) {
            if (!confirm(langPack[curLang]['confirm-del'])) return;
            try {
                const { error } = await supabaseClient.from('poker_logs').delete().eq('id', id).eq('user_id', currentUser.id);
                if (error) throw error;
                await fetchData(); 
            } catch (err) { showToast('Delete Error'); }
        }

        function switchLevel(lvl) {
            currentLevel = lvl;
            document.getElementById('currentLevelHint').innerText = `Level: ${lvl === 'ALL' ? '1/2' : lvl}`;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.innerText.includes(lvl) || (lvl === 'ALL' && el.getAttribute('data-key') === 'nav-all'));
            });
            if(navigator.vibrate) navigator.vibrate(10);
            render();
        }

        function switchTime(type, el) {
            currentTimeFilter = type;
            currentSearchMonth = ''; 
            document.getElementById('monthPicker').value = '';
            document.querySelectorAll('.time-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function searchByMonth(monthStr) {
            if(!monthStr) return;
            currentTimeFilter = 'SEARCH';
            currentSearchMonth = monthStr; 
            document.querySelectorAll('.time-pill').forEach(p => p.classList.remove('active'));
            render();
        }

        function render() {
            if(!myChart) return;
            myChart.resize(); 

            let filtered = currentLevel === 'ALL' ? fullData : fullData.filter(d => d.level === currentLevel);
            
            const now = new Date();
            if (currentTimeFilter === 'MONTH') {
                filtered = filtered.filter(d => {
                    const dDate = new Date(d.created_at);
                    return dDate.getFullYear() === now.getFullYear() && dDate.getMonth() === now.getMonth();
                });
            } else if (currentTimeFilter === 'WEEK') {
                const startOfWeek = new Date(now);
                startOfWeek.setDate(now.getDate() - now.getDay()); 
                startOfWeek.setHours(0,0,0,0);
                filtered = filtered.filter(d => new Date(d.created_at) >= startOfWeek);
            } else if (currentTimeFilter === 'SEARCH') {
                filtered = filtered.filter(d => d.created_at.startsWith(currentSearchMonth));
            }

            let sum = 0, winCount = 0;
            const dailyData = {}, barData = [], lineData = [], xAxisData = [];

            filtered.forEach((d, i) => {
                const amt = parseFloat(d.amount);
                sum += amt;
                if(amt > 0) winCount++;
                barData.push(amt);
                lineData.push(sum);
                xAxisData.push(`G${i+1}`);
                const dateKey = d.created_at.split('T')[0];
                dailyData[dateKey] = (dailyData[dateKey] || 0) + amt;
            });

            const winRate = filtered.length > 0 ? ((winCount / filtered.length) * 100).toFixed(1) : 0;
            const avgWin = filtered.length > 0 ? (sum / filtered.length).toFixed(0) : 0;
            const dayValues = Object.values(dailyData);
            const maxDayWin = dayValues.length > 0 ? Math.max(...dayValues, 0) : 0;
            const maxDayLoss = dayValues.length > 0 ? Math.min(...dayValues, 0) : 0;

            const totalEl = document.getElementById('totalWaterDisplay');
            totalEl.innerText = `${sum > 0 ? '+' : ''}${sum}`;
            totalEl.style.color = sum >= 0 ? 'var(--win)' : 'var(--lose)';

            document.getElementById('statWinRate').innerText = winRate + '%';
            document.getElementById('statAvgWin').innerText = (avgWin > 0 ? '+' : '') + avgWin;
            document.getElementById('statMaxSwing').innerHTML = `<span style="color:var(--win)">+${maxDayWin}</span><br><span style="color:#444">/</span> <span style="color:var(--lose)">${maxDayLoss}</span>`;

            myChart.setOption({
                backgroundColor: 'transparent',
                grid: { top: 30, bottom: 20, left: 45, right: 45 },
                xAxis: { 
                    type: 'category', data: xAxisData,
                    axisLabel: { color: '#555', fontSize: 9 }, axisLine: { lineStyle: { color: '#222' } }
                },
                yAxis: [
                    { type: 'value', splitLine: { show: false }, axisLabel: { color: '#555', fontSize: 9 } },
                    { type: 'value', splitLine: { lineStyle: { color: 'rgba(255,255,255,0.02)' } }, axisLabel: { color: 'var(--gold)', fontSize: 9 } }
                ],
                series: [
                    {
                        name: langPack[curLang]['chart-bar'], type: 'bar', yAxisIndex: 0, barWidth: '40%',
                        itemStyle: { color: p => p.value >= 0 ? '#FF4757' : '#2ED573', borderRadius: [2, 2, 0, 0] },
                        data: barData
                    },
                    {
                        name: langPack[curLang]['chart-line'], type: 'line', yAxisIndex: 1, smooth: true, symbol: 'circle', symbolSize: 4,
                        itemStyle: { color: '#E5C07B' }, lineStyle: { width: 2, color: '#E5C07B' },
                        data: lineData
                    }
                ]
            });

            let html = '';
            const reversed = [...filtered].reverse(); 
            if (reversed.length === 0) {
                html = `<div style="text-align:center; color:#444; padding:40px; font-size: 12px;">${langPack[curLang]['no-data']}</div>`;
            } else {
                reversed.forEach(d => {
                    const isWin = d.amount >= 0;
                    html += `
                        <div class="item-card" style="border-left-color: ${isWin ? 'var(--win)' : 'var(--lose)'}">
                            <div class="item-header">
                                <div class="item-meta">
                                    <span class="item-time">${new Date(d.created_at).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).replace(/\//g, '-')}</span>
                                    <span class="item-lvl">LV.${d.level}</span>
                                </div>
                                <div class="item-amt" style="color:${isWin ? 'var(--win)' : 'var(--lose)'}">
                                    ${isWin ? '+' : ''}${d.amount}
                                </div>
                            </div>
                            <div class="action-btns">
                                <button class="btn-mini btn-edit" onclick="editItem('${d.id}', ${d.amount})">${langPack[curLang]['btn-edit']}</button>
                                <button class="btn-mini btn-del" onclick="deleteItem('${d.id}')">${langPack[curLang]['btn-del']}</button>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('historyList').innerHTML = html;
        }

        // 初始化
        window.onload = () => {
            updateLangUI();
        };
    </script>
</body>
</html>
