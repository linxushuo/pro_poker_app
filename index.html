<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AceTracker Pro v3.5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23121212'/><path d='M50 15 C20 45 10 65 30 75 C40 80 50 70 50 60 C50 70 60 80 70 75 C90 65 80 45 50 15 Z' fill='%23D4AF37'/><path d='M45 85 L55 85 L50 60 Z' fill='%23D4AF37'/><path d='M10 85 Q 40 60 50 45 T 90 20' fill='none' stroke='%23FF3366' stroke-width='6' stroke-linecap='round'/></svg>">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --bg: #0a0a0a; --card: rgba(30, 30, 30, 0.9); --win: #FF4757; --lose: #2ED573; --text: #F0F0F0; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 开场动画 */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .logo-anim { font-size: 60px; color: var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* 登录与主界面布局 */
        #auth-section, #app-section { display: none; min-height: 100vh; flex-direction: column; }
        .glass-panel { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; margin: 15px; }
        
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; }

        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 10px; sticky; top: 0; z-index: 100; background: var(--bg); }
        .nav-item { padding: 8px 18px; border-radius: 15px; background: #222; color: #888; white-space: nowrap; font-size: 13px; font-weight: 600; }
        .nav-item.active { background: var(--gold); color: #000; }

        .chart-box { height: 320px; margin-bottom: 20px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .btn-sm { padding: 8px; border-radius: 8px; border: none; font-size: 12px; color: #fff; background: rgba(255,255,255,0.1); flex: 1; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim">♠</div>
        <div style="color:var(--gold); margin-top:20px; letter-spacing:3px;">ACETRACKER PRO</div>
    </div>

    <div id="auth-section">
        <div class="glass-panel" style="margin-top:auto; margin-bottom:auto;">
            <h2 style="color:var(--gold); text-align:center;">数据同步授权</h2>
            <input type="email" id="emailInput" placeholder="输入白名单 QQ 邮箱">
            <button class="btn-main" onclick="handleLogin()">发送登录链路</button>
        </div>
    </div>

    <div id="app-section">
        <div class="nav-tabs">
            <div class="nav-item active" onclick="switchLevel('ALL')">全部汇总</div>
            <div class="nav-item" onclick="switchLevel('0.5/1')">0.5/1</div>
            <div class="nav-item" onclick="switchLevel('1/2')">1/2</div>
            <div class="nav-item" onclick="switchLevel('10/20')">10/20</div>
        </div>

        <div style="padding: 0 15px;">
            <div class="chart-box" id="mainChart"></div>

            <div class="glass-panel" style="margin: 0 0 20px 0;">
                <h4 style="margin:0 0 15px 0; color:var(--gold);">快速记分</h4>
                <input type="number" id="quickAmount" placeholder="本场盈亏积分">
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:15px;">
                    <div style="background:#222; padding:12px; text-align:center; border-radius:10px; color:var(--win);" onclick="adjustAmount(100)">+100</div>
                    <div style="background:#222; padding:12px; text-align:center; border-radius:10px; color:var(--win);" onclick="adjustAmount(500)">+500</div>
                    <div style="background:#222; padding:12px; text-align:center; border-radius:10px; color:var(--lose);" onclick="adjustAmount(-100)">-100</div>
                    <div style="background:#222; padding:12px; text-align:center; border-radius:10px; color:var(--lose);" onclick="adjustAmount(-500)">-500</div>
                </div>
                <button class="btn-main" onclick="submitData()">同步至云端</button>
            </div>

            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bemgvdxisardejdvbnif.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_qfMjJSCX0FGWbgnurfcUEg_RCBvb9Pz';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentLevel = 'ALL';
        let fullData = [];
        let myChart = echarts.init(document.getElementById('mainChart'));

        // 核心监听：捕捉登录状态
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('splash').style.display = 'none';
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                fetchData();
            } else {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('auth-section').style.display = 'flex';
            }
        });

        async function handleLogin() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) return alert("请输入邮箱");
            const { error } = await supabaseClient.auth.signInWithOtp({ 
                email, options: { emailRedirectTo: window.location.href }
            });
            if (error) alert(error.message);
            else alert("请前往 QQ 邮箱，长按并复制登录链接到此浏览器打开！");
        }

        async function fetchData() {
            const { data, error } = await supabaseClient
                .from('poker_logs')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: true });
            
            if (!error) {
                fullData = data || [];
                // 针对移动端渲染优化的延迟执行
                setTimeout(render, 100);
            }
        }

        function adjustAmount(val) {
            const input = document.getElementById('quickAmount');
            input.value = (parseFloat(input.value) || 0) + val;
        }

        async function submitData() {
            const val = parseFloat(document.getElementById('quickAmount').value);
            if (isNaN(val)) return alert("无效数值");

            const { error } = await supabaseClient.from('poker_logs').insert([{
                user_id: currentUser.id, amount: val, level: currentLevel === 'ALL' ? '1/2' : currentLevel
            }]);

            if (!error) {
                document.getElementById('quickAmount').value = '';
                fetchData();
            } else {
                alert("存入失败: " + error.message);
            }
        }

        function switchLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.innerText.includes(lvl) || (lvl==='ALL' && el.innerText.includes('全部'))));
            render();
        }

        function render() {
            const filtered = currentLevel === 'ALL' ? fullData : fullData.filter(d => d.level === currentLevel);
            
            // 计算累计盈亏曲线
            let sum = 0;
            const lineData = filtered.map(d => { sum += d.amount; return sum; });
            const xAxisData = filtered.map((_, i) => `No.${i+1}`);

            myChart.setOption({
                backgroundColor: 'transparent',
                grid: { top: 40, bottom: 40, left: 50, right: 20 },
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                xAxis: { 
                    type: 'category', 
                    data: xAxisData,
                    axisLabel: { color: '#555', interval: Math.floor(xAxisData.length / 5) },
                    axisLine: { lineStyle: { color: '#333' } }
                },
                yAxis: { 
                    type: 'value', 
                    scale: true, // 【核心修复】自动缩放坐标轴，显示负值
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } },
                    axisLabel: { color: '#888' }
                },
                series: [{
                    data: lineData,
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 8,
                    lineStyle: { 
                        width: 4, 
                        color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0, color:'#D4AF37'},{offset:1, color:'#FF3366'}]) 
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0, color:'rgba(212,175,55,0.2)'},{offset:1, color:'transparent'}])
                    },
                    // 根据盈亏变色
                    itemStyle: {
                        color: function(params) {
                            return params.value >= 0 ? '#FF3366' : '#2ED573';
                        }
                    }
                }]
            });

            // 列表渲染
            let html = '';
            filtered.slice().reverse().forEach(d => {
                html += `
                    <div class="item-card" style="border-left-color: ${d.amount>=0?'var(--win)':'var(--lose)'}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-size:11px; color:#666;">${new Date(d.created_at).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
                                <div style="font-size:12px; color:var(--gold);">${d.level}</div>
                            </div>
                            <div style="font-size:20px; font-weight:bold; color:${d.amount>=0?'var(--win)':'var(--lose)'}">
                                ${d.amount>=0?'+':''}${d.amount}
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('historyList').innerHTML = html || '<div style="text-align:center; color:#444; padding:20px;">暂无该级别对局记录</div>';
        }

        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
